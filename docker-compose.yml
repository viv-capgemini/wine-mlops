version: '3.8'

services:
  # PostgreSQL database for MLflow backend
  postgres:
    image: postgres:15-alpine
    container_name: wine-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wine-network

  # MLflow Tracking Server
  mlflow:
    image: wine-mlflow:latest
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: wine-mlflow
    ports:
      - "5000:5000"
    environment:
      BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow}@postgres:5432/${POSTGRES_DB:-mlflow}
      ARTIFACTS_DESTINATION: /mlflow/artifacts
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wine-network
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow}@postgres:5432/${POSTGRES_DB:-mlflow}
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000

  # Model Training Service
  train:
    image: wine-train:latest
    build:
      context: .
      dockerfile: Dockerfile.train
    container_name: wine-train
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    volumes:
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    depends_on:
      mlflow:
        condition: service_started
    networks:
      - wine-network
    # Uncomment to run training automatically when container starts
    # command: python train.py --experiment wine-prediction --run docker-run-1

volumes:
  postgres_data:
    driver: local
  mlflow_artifacts:
    driver: local

networks:
  wine-network:
    driver: bridge
